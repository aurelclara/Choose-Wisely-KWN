<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose Wisely.</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --pink-deep: #e8a0b4;
    --pink-mid: #f2c4d0;
    --pink-soft: #fad4de;
    --pink-pale: #fde8ee;
    --pink-ultra: #fff0f4;
    --blush: #f7b8c8;
    --peach: #fdddd0;
    --cream: #fff8f5;
    --rose: #d4829a;
    --white: #ffffff;
    --text-dark: #3d2535;
    --text-mid: #7a4d62;
    --text-light: #b08898;
    --glow: rgba(232, 160, 180, 0.4);
    --warmth: 0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    overflow-x: hidden;
    min-height: 100vh;
    transition: background 1.5s ease;
  }

  /* ─── BLOBS ─── */
  .blob-container {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .blob {
    position: absolute; border-radius: 50%;
    filter: blur(80px); opacity: 0.45;
    transition: opacity 2s ease, transform 2s ease;
    animation: blobFloat 12s ease-in-out infinite alternate;
  }
  .blob-1 { width: 500px; height: 500px; background: radial-gradient(circle, #f9c8d8, #f2a8c0); top: -100px; left: -100px; animation-delay: 0s; }
  .blob-2 { width: 400px; height: 400px; background: radial-gradient(circle, #fde4d0, #f7c8d8); bottom: -80px; right: -80px; animation-delay: -4s; }
  .blob-3 { width: 300px; height: 300px; background: radial-gradient(circle, #fad8e8, #f9c0d0); top: 40%; left: 60%; animation-delay: -8s; }
  .blob-4 { width: 200px; height: 200px; background: radial-gradient(circle, #fde0ea, #f5c4d4); top: 20%; right: 15%; animation-delay: -2s; opacity: 0.3; }

  @keyframes blobFloat {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(30px, 40px) scale(1.08); }
  }

  /* ─── PARTICLES ─── */
  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: particleFloat linear infinite;
    pointer-events: none;
  }
  @keyframes particleFloat {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
  }

  /* ─── SCREENS ─── */
  .screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 10; padding: 20px;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }
  .screen.exit { opacity: 0; transform: translateY(-20px); }

  /* ─── LANDING ─── */
  #landing { flex-direction: column; text-align: center; }
  .landing-inner {
    max-width: 640px;
    animation: fadeUp 1.2s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .landing-tag {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight: 500; letter-spacing: 3px;
    text-transform: uppercase; color: var(--text-light);
    margin-bottom: 28px;
    animation: fadeUp 1s ease 0.3s both;
  }

  .landing-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(64px, 12vw, 110px);
    font-weight: 300; line-height: 0.95;
    color: var(--text-dark);
    letter-spacing: -2px;
    margin-bottom: 24px;
    animation: fadeUp 1s ease 0.5s both;
  }
  .landing-title span {
    background: linear-gradient(135deg, #d4829a, #e8a0b4, #f7b8c8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .landing-subtitle {
    font-size: 15px; font-weight: 300;
    color: var(--text-mid); letter-spacing: 1px;
    margin-bottom: 52px;
    animation: fadeUp 1s ease 0.7s both;
  }

  .btn-start {
    display: inline-flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, #e8a0b4, #d4829a);
    color: white; border: none; padding: 18px 44px;
    border-radius: 50px; font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500; letter-spacing: 1.5px;
    text-transform: uppercase; cursor: pointer;
    box-shadow: 0 12px 40px rgba(212, 130, 154, 0.4);
    transition: all 0.3s ease;
    animation: fadeUp 1s ease 0.9s both;
  }
  .btn-start:hover {
    transform: translateY(-3px);
    box-shadow: 0 20px 50px rgba(212, 130, 154, 0.55);
  }
  .btn-start::after { content: '→'; font-size: 16px; }

  .landing-footer {
    margin-top: 60px;
    font-size: 11px; color: var(--text-light); letter-spacing: 2px;
    text-transform: uppercase;
    animation: fadeUp 1s ease 1.1s both;
  }

  /* ─── SCENARIO CARD ─── */
  #scenario { flex-direction: column; align-items: center; justify-content: center; }

  .progress-bar-wrap {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 3px; background: rgba(232,160,180,0.2);
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #d4829a, #f7b8c8, #d4829a);
    background-size: 200% 100%;
    animation: shimmer 2s linear infinite;
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }
  @keyframes shimmer { 0%{background-position:0% 0%} 100%{background-position:200% 0%} }

  .progress-label {
    position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
    z-index: 100;
    font-size: 11px; letter-spacing: 3px; color: var(--text-light);
    font-weight: 400; text-transform: uppercase;
  }

  .scenario-card {
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.85);
    border-radius: 32px;
    padding: clamp(32px, 6vw, 60px);
    max-width: 680px; width: 100%;
    box-shadow: 0 20px 80px rgba(212,130,154,0.15), 0 4px 24px rgba(212,130,154,0.1);
    animation: cardIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
    position: relative; overflow: hidden;
  }
  .scenario-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, transparent, var(--pink-deep), transparent);
    opacity: 0.6;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: scale(0.93) translateY(30px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes cardOut {
    from { opacity: 1; transform: scale(1) translateY(0); }
    to { opacity: 0; transform: scale(0.95) translateY(-20px); }
  }

  .scenario-theme {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--text-light); margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .theme-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: linear-gradient(135deg, #d4829a, #f7b8c8);
  }

  .scenario-emoji {
    font-size: 52px; margin-bottom: 20px; display: block;
    filter: drop-shadow(0 4px 16px rgba(212,130,154,0.3));
    animation: emojiPulse 3s ease-in-out infinite;
  }
  @keyframes emojiPulse {
    0%,100% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.06) rotate(-2deg); }
  }

  .scenario-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(22px, 4vw, 32px); font-weight: 400;
    line-height: 1.35; color: var(--text-dark);
    margin-bottom: 36px;
  }
  .scenario-title em { font-style: italic; color: var(--rose); }

  .choices { display: flex; flex-direction: column; gap: 12px; }

  .choice-btn {
    background: rgba(255,255,255,0.7);
    border: 1.5px solid rgba(232,160,180,0.25);
    border-radius: 16px;
    padding: 18px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 400;
    color: var(--text-mid);
    cursor: pointer;
    text-align: left;
    transition: all 0.25s ease;
    display: flex; align-items: center; gap: 14px;
    position: relative; overflow: hidden;
  }
  .choice-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(232,160,180,0.12), rgba(247,184,200,0.08));
    opacity: 0; transition: opacity 0.25s ease;
  }
  .choice-btn:hover { border-color: rgba(232,160,180,0.6); transform: translateX(4px); color: var(--text-dark); }
  .choice-btn:hover::before { opacity: 1; }

  .choice-letter {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
    background: rgba(232,160,180,0.2); color: var(--rose);
    transition: all 0.25s ease;
  }
  .choice-btn:hover .choice-letter { background: linear-gradient(135deg, #d4829a, #f7b8c8); color: white; }

  /* Choice states */
  .choice-btn.selected-positive {
    border-color: rgba(180,212,160,0.6);
    background: rgba(220,240,210,0.4);
    color: #4a7a40;
  }
  .choice-btn.selected-neutral {
    border-color: rgba(232,200,160,0.6);
    background: rgba(250,235,200,0.4);
    color: #7a6040;
  }
  .choice-btn.selected-negative {
    border-color: rgba(212,160,160,0.6);
    background: rgba(240,220,220,0.4);
    color: #7a4040;
  }

  /* ─── FEEDBACK ─── */
  .feedback-overlay {
    position: fixed; inset: 0; z-index: 50;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    background: rgba(253, 232, 238, 0.7);
    backdrop-filter: blur(8px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .feedback-overlay.show { opacity: 1; pointer-events: all; }

  .feedback-card {
    background: rgba(255,255,255,0.9);
    border: 1px solid rgba(255,255,255,0.95);
    border-radius: 28px;
    padding: 48px 52px;
    max-width: 480px; width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(212,130,154,0.2);
    transform: scale(0.9); transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  .feedback-overlay.show .feedback-card { transform: scale(1); }

  .feedback-icon { font-size: 44px; margin-bottom: 20px; display: block; }

  .feedback-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-style: italic; font-weight: 300;
    color: var(--text-dark); line-height: 1.5; margin-bottom: 28px;
  }

  .feedback-next {
    background: linear-gradient(135deg, #e8a0b4, #d4829a);
    color: white; border: none; padding: 14px 36px;
    border-radius: 50px; font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500; letter-spacing: 2px;
    text-transform: uppercase; cursor: pointer;
    box-shadow: 0 8px 24px rgba(212,130,154,0.35);
    transition: all 0.25s ease;
  }
  .feedback-next:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(212,130,154,0.45); }

  /* ─── ENDING ─── */
  #ending {
    flex-direction: column; overflow-y: auto;
    align-items: center; padding: 60px 20px;
    z-index: 10;
  }

  .ending-inner { max-width: 720px; width: 100%; }

  .ending-header {
    text-align: center; margin-bottom: 60px;
    animation: fadeUp 0.8s ease both;
  }
  .ending-tag {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--text-light); margin-bottom: 20px;
  }
  .ending-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(44px, 8vw, 80px); font-weight: 300;
    color: var(--text-dark); line-height: 1;
    margin-bottom: 16px;
  }
  .ending-title span {
    background: linear-gradient(135deg, #d4829a, #e8a0b4);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .scores-grid {
    display: flex; flex-direction: column; gap: 18px; margin-bottom: 48px;
  }

  .score-card {
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.85);
    border-radius: 24px; padding: 28px 32px;
    box-shadow: 0 8px 32px rgba(212,130,154,0.1);
    animation: fadeUp 0.7s ease both;
  }

  .score-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .score-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 400; color: var(--text-dark);
    display: flex; align-items: center; gap: 10px;
  }
  .score-name .s-emoji { font-size: 20px; }
  .score-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; font-weight: 300; color: var(--rose);
  }

  .score-bar-bg {
    height: 8px; background: rgba(232,160,180,0.15); border-radius: 50px; overflow: hidden;
  }
  .score-bar-fill {
    height: 100%; border-radius: 50px;
    background: linear-gradient(90deg, #d4829a, #f7b8c8, #fde4d0);
    background-size: 200% 100%;
    animation: shimmer 2s linear infinite;
    width: 0%; transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
  }

  .ending-message {
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.9);
    border-radius: 28px; padding: 48px;
    text-align: center; margin-bottom: 40px;
    animation: fadeUp 0.7s ease 0.5s both;
  }
  .ending-quote {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(22px, 4vw, 34px); font-style: italic; font-weight: 300;
    color: var(--text-dark); line-height: 1.4; margin-bottom: 20px;
  }
  .ending-sub {
    font-size: 13px; color: var(--text-light); letter-spacing: 1px;
  }

  .ending-level {
    background: linear-gradient(135deg, rgba(232,160,180,0.2), rgba(247,184,200,0.15));
    border: 1px solid rgba(232,160,180,0.3);
    border-radius: 20px; padding: 24px 32px; margin-bottom: 48px;
    text-align: center;
    animation: fadeUp 0.7s ease 0.6s both;
  }
  .level-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-light); margin-bottom: 8px; }
  .level-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px; font-weight: 400; color: var(--rose);
  }

  .btn-restart {
    display: block; width: fit-content; margin: 0 auto;
    background: transparent;
    border: 1.5px solid rgba(212,130,154,0.5);
    color: var(--rose); padding: 15px 40px;
    border-radius: 50px; font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500; letter-spacing: 2px;
    text-transform: uppercase; cursor: pointer;
    transition: all 0.3s ease;
    animation: fadeUp 0.7s ease 0.7s both;
  }
  .btn-restart:hover {
    background: rgba(212,130,154,0.1);
    border-color: var(--rose);
    transform: translateY(-2px);
  }

  /* ─── SPARKLES ─── */
  .sparkle {
    position: fixed; pointer-events: none; z-index: 99;
    width: 6px; height: 6px; border-radius: 50%;
    background: radial-gradient(circle, #fde8ee, #f9c0d0);
    animation: sparkleAnim 0.8s ease forwards;
  }
  @keyframes sparkleAnim {
    0% { transform: scale(0) rotate(0deg); opacity: 1; }
    50% { transform: scale(1.5) rotate(180deg); opacity: 0.8; }
    100% { transform: scale(0) rotate(360deg) translate(40px,-40px); opacity: 0; }
  }

  /* ─── LOADING ─── */
  #loading {
    background: var(--cream);
    flex-direction: column; text-align: center; gap: 24px;
  }
  .loading-spinner {
    width: 44px; height: 44px; border-radius: 50%;
    border: 2px solid rgba(232,160,180,0.2);
    border-top-color: var(--pink-deep);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 300; color: var(--text-light);
    font-style: italic;
  }

  /* Responsive */
  @media(max-width:600px) {
    .scenario-card { padding: 28px 24px; border-radius: 24px; }
    .choice-btn { padding: 16px 20px; font-size: 13px; }
    .feedback-card { padding: 36px 28px; }
    .ending-message { padding: 36px 28px; }
    .score-card { padding: 22px 24px; }
  }
</style>
</head>
<body>

<!-- BLOBS -->
<div class="blob-container">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
</div>

<!-- PARTICLES -->
<div class="particles" id="particles"></div>

<!-- PROGRESS BAR -->
<div class="progress-bar-wrap" id="progressWrap" style="opacity:0">
  <div class="progress-bar-fill" id="progressFill"></div>
</div>
<div class="progress-label" id="progressLabel" style="opacity:0"></div>

<!-- FEEDBACK -->
<div class="feedback-overlay" id="feedbackOverlay">
  <div class="feedback-card">
    <span class="feedback-icon" id="feedbackIcon"></span>
    <p class="feedback-text" id="feedbackText"></p>
    <button class="feedback-next" id="feedbackNext">Lanjutkan →</button>
  </div>
</div>

<!-- SCREEN: LOADING -->
<div class="screen" id="loading">
  <div class="loading-spinner"></div>
  <p class="loading-text">Loading experience...</p>
</div>

<!-- SCREEN: LANDING -->
<div class="screen hidden" id="landing">
  <div class="landing-inner">
    <p class="landing-tag">✦ Interactive Social Experience</p>
    <h1 class="landing-title">Choose<br><span>Wisely.</span></h1>
    <p class="landing-subtitle">10 choices &nbsp;·&nbsp; 10 values &nbsp;·&nbsp; 1 society.</p>
    <button class="btn-start" id="btnStart">Start Experience</button>
    <p class="landing-footer">Scroll — Choose — Reflect</p>
  </div>
</div>

<!-- SCREEN: SCENARIO -->
<div class="screen hidden" id="scenario">
  <div class="scenario-card" id="scenarioCard">
    <div class="scenario-theme"><div class="theme-dot"></div><span id="cardTheme"></span></div>
    <span class="scenario-emoji" id="cardEmoji"></span>
    <h2 class="scenario-title" id="cardTitle"></h2>
    <div class="choices" id="cardChoices"></div>
  </div>
</div>

<!-- SCREEN: ENDING -->
<div class="screen hidden" id="ending">
  <div class="ending-inner">
    <div class="ending-header">
      <p class="ending-tag">✦ Your Reflection</p>
      <h2 class="ending-title">Your<br><span>Values.</span></h2>
    </div>

    <div class="scores-grid" id="scoresGrid"></div>

    <div class="ending-level" id="endingLevel">
      <p class="level-label">Social Awareness Level</p>
      <p class="level-value" id="levelValue"></p>
    </div>

    <div class="ending-message">
      <p class="ending-quote">"Every small choice shapes society."</p>
      <p class="ending-sub">Keputusan harianmu membentuk dunia di sekitarmu.</p>
    </div>

    <button class="btn-restart" id="btnRestart">↺ &nbsp; Begin Again</button>
  </div>
</div>

<script>
const scenarios = [
  {
    theme: "Identitas Nasional",
    emoji: "🇮🇩",
    title: "Kamu melihat temanmu <em>mengejek budaya daerah lain</em>.",
    choices: [
      { text: "Ikut bercanda bersama teman", type: "negative" },
      { text: "Diam saja dan pura-pura tidak dengar", type: "neutral" },
      { text: "Menghargai dan merayakan perbedaan budaya", type: "positive" }
    ],
    feedbacks: [
      { icon: "😶", text: "Satu tawa bisa melukai satu budaya.", score: "identity" },
      { icon: "🌫️", text: "Diam juga merupakan pilihan — dan juga merupakan pernyataan.", score: "identity" },
      { icon: "🌺", text: "Kebhinekaan adalah kekuatan, bukan kelemahan.", score: "identity_good" }
    ],
    scoreKey: "respect"
  },
  {
    theme: "Toleransi Beragama",
    emoji: "🤝",
    title: "Temanmu izin beribadah saat <em>kegiatan bersama sedang berlangsung</em>.",
    choices: [
      { text: "Mengeluh karena mengganggu kegiatan", type: "negative" },
      { text: "Mengabaikan dan melanjutkan tanpa peduli", type: "neutral" },
      { text: "Memberi waktu dan menghormati ibadahnya", type: "positive" }
    ],
    feedbacks: [
      { icon: "💔", text: "Intoleransi tumbuh dari ketidaknyamanan kecil sehari-hari.", score: "tolerance" },
      { icon: "🌫️", text: "Acuh tak acuh bukan berarti menghormati.", score: "tolerance" },
      { icon: "🕊️", text: "Menghormati keyakinan orang lain adalah fondasi masyarakat damai.", score: "tolerance_good" }
    ],
    scoreKey: "respect"
  },
  {
    theme: "Kesadaran Hukum",
    emoji: "⚖️",
    title: "Kamu melihat teman melanggar <em>aturan lalu lintas</em>.",

const scoreCategories = [
  { key: "respect", label: "Respect", emoji: "🤝", desc: "Rasa hormat terhadap perbedaan" },
  { key: "responsibility", label: "Responsibility", emoji: "⚖️", desc: "Tanggung jawab pribadi" },
  { key: "empathy", label: "Empathy", emoji: "💛", desc: "Kepedulian terhadap sesama" },
  { key: "environment", label: "Environmental Care", emoji: "🌿", desc: "Kesadaran lingkungan" },
  { key: "social", label: "Social Awareness", emoji: "🏙️", desc: "Kesadaran sosial & komunitas" }
];

let currentScenario = 0;
let positiveCount = 0;
let scores = { respect: 0, responsibility: 0, empathy: 0, environment: 0, social: 0 };
let answered = false;

// Init particles
function initParticles() {
  const container = document.getElementById('particles');
  for(let i=0; i<18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random()*8+3;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      background: radial-gradient(circle, ${randomPink()}, transparent);
      opacity: ${Math.random()*0.5+0.2};
      animation-duration: ${Math.random()*15+10}s;
      animation-delay: ${Math.random()*-20}s;
    `;
    container.appendChild(p);
  }
}

function randomPink() {
  const pinks = ['#f9c8d8','#fde4d0','#f7b8c8','#fad8e8','#fde8ee'];
  return pinks[Math.floor(Math.random()*pinks.length)];
}

// Sparkle on click
document.addEventListener('click', e => {
  for(let i=0;i<5;i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.cssText = `left:${e.clientX+Math.random()*30-15}px; top:${e.clientY+Math.random()*30-15}px; animation-delay:${i*0.06}s`;
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 1000);
  }
});

// Update ambient based on score
function updateAmbient() {
  const ratio = positiveCount / (currentScenario || 1);
  const warmth = ratio;
  document.documentElement.style.setProperty('--warmth', warmth);

  const blobs = document.querySelectorAll('.blob');
  if(warmth > 0.6) {
    blobs.forEach(b => { b.style.opacity = '0.55'; b.style.filter = 'blur(70px) saturate(1.3)'; });
    document.body.style.background = 'linear-gradient(135deg, #fff8f5, #fde8ee, #fff4f8)';
  } else if(warmth < 0.3 && currentScenario > 0) {
    blobs.forEach(b => { b.style.opacity = '0.25'; b.style.filter = 'blur(90px) saturate(0.7)'; });
    document.body.style.background = 'linear-gradient(135deg, #f8f6f7, #f5f0f2, #f8f5f6)';
  } else {
    blobs.forEach(b => { b.style.opacity = '0.45'; b.style.filter = 'blur(80px) saturate(1)'; });
    document.body.style.background = '';
  }
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    if(s.id === id) {
      s.classList.remove('hidden','exit');
    } else {
      s.classList.add('hidden');
    }
  });
  const pw = document.getElementById('progressWrap');
  const pl = document.getElementById('progressLabel');
  if(id === 'scenario') {
    pw.style.opacity = '1'; pl.style.opacity = '1';
  } else {
    pw.style.opacity = '0'; pl.style.opacity = '0';
  }
}

function loadScenario(idx) {
  if(idx >= scenarios.length) { showEnding(); return; }
  const s = scenarios[idx];
  answered = false;

  document.getElementById('cardTheme').textContent = s.theme;
  document.getElementById('cardEmoji').textContent = s.emoji;
  document.getElementById('cardTitle').innerHTML = s.title;

  const choicesEl = document.getElementById('cardChoices');
  choicesEl.innerHTML = '';
  s.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-letter">${String.fromCharCode(65+i)}</span><span>${c.text}</span>`;
    btn.onclick = () => selectChoice(i, c.type, s.feedbacks[i], s.scoreKey);
    choicesEl.appendChild(btn);
  });

  // Progress
  const pct = (idx / scenarios.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${idx + 1} / ${scenarios.length}`;

  // Animate card
  const card = document.getElementById('scenarioCard');
  card.style.animation = 'none';
  requestAnimationFrame(() => { card.style.animation = 'cardIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both'; });
}

function selectChoice(choiceIdx, type, feedback, scoreKey) {
  if(answered) return;
  answered = true;

  // Visual feedback on button
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach((b,i) => {
    if(i === choiceIdx) b.classList.add('selected-' + type);
    b.style.pointerEvents = 'none';
  });

  // Score
  if(type === 'positive') {
    positiveCount++;
    scores[scoreKey] = Math.min(100, (scores[scoreKey] || 0) + 35);
  } else if(type === 'neutral') {
    scores[scoreKey] = Math.min(100, (scores[scoreKey] || 0) + 15);
  } else {
    scores[scoreKey] = Math.max(0, (scores[scoreKey] || 0) + 5);
  }

  updateAmbient();

  // Show feedback
  setTimeout(() => {
    document.getElementById('feedbackIcon').textContent = feedback.icon;
    document.getElementById('feedbackText').textContent = feedback.text;
    document.getElementById('feedbackOverlay').classList.add('show');
  }, 400);
}

document.getElementById('feedbackNext').onclick = () => {
  document.getElementById('feedbackOverlay').classList.remove('show');
  currentScenario++;
  setTimeout(() => loadScenario(currentScenario), 300);
};

function showEnding() {
  showScreen('ending');
  document.getElementById('progressFill').style.width = '100%';

  // Build score cards
  const grid = document.getElementById('scoresGrid');
  grid.innerHTML = '';
  scoreCategories.forEach((cat, i) => {
    const val = Math.min(100, Math.round(scores[cat.key] || 0));
    const card = document.createElement('div');
    card.className = 'score-card';
    card.style.animationDelay = (i*0.1) + 's';
    card.innerHTML = `
      <div class="score-header">
        <span class="score-name"><span class="s-emoji">${cat.emoji}</span>${cat.label}</span>
        <span class="score-num" data-target="${val}">0%</span>
      </div>
      <div class="score-bar-bg"><div class="score-bar-fill"></div></div>
    `;
    grid.appendChild(card);
  });

  // Animate after a moment
  setTimeout(() => {
    document.querySelectorAll('.score-card').forEach(card => {
      const numEl = card.querySelector('.score-num');
      const barEl = card.querySelector('.score-bar-fill');
      const target = parseInt(numEl.dataset.target);
      barEl.style.width = target + '%';

      let current = 0;
      const interval = setInterval(() => {
        current = Math.min(current + 2, target);
        numEl.textContent = current + '%';
        if(current >= target) clearInterval(interval);
      }, 20);
    });
  }, 400);

  // Level
  const totalScore = Object.values(scores).reduce((a,b) => a+b, 0) / 5;
  let level, levelMsg;
  if(positiveCount >= 8) { level = "Conscious Citizen ✨"; }
  else if(positiveCount >= 6) { level = "Aware Soul 🌸"; }
  else if(positiveCount >= 4) { level = "Growing Mind 🌱"; }
  else if(positiveCount >= 2) { level = "Quiet Observer 🌫️"; }
  else { level = "Silent Bystander 🤍"; }
  document.getElementById('levelValue').textContent = level;
}

// Boot sequence
window.onload = () => {
  initParticles();
  setTimeout(() => {
    showScreen('landing');
  }, 1200);
};

document.getElementById('btnStart').onclick = () => {
  showScreen('scenario');
  loadScenario(0);
};

document.getElementById('btnRestart').onclick = () => {
  currentScenario = 0; positiveCount = 0;
  scores = { respect: 0, responsibility: 0, empathy: 0, environment: 0, social: 0 };
  document.body.style.background = '';
  document.querySelectorAll('.blob').forEach(b => { b.style.opacity='0.45'; b.style.filter='blur(80px)'; });
  showScreen('landing');
};
